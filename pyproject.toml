[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "iterthink-local"
version = "0.1.0"
description = "Iterthink local Markdown writer (Flet + Ollama)"
requires-python = ">=3.11"
dependencies = [
    "flet>=0.80.0",
    "ollama>=0.4.0",
    "PyYAML>=6.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["iterthink*"]

[tool.flet]
product = "Iterthink"
org = "dev.iterthink.local"
company = "Iterthink"
copyright = "Copyright (c) 2026"

[tool.flet.app]
path = "."
exclude = [
    "old",
    ".venv",
    ".git",
    ".cursor",
    "__pycache__",
    "build",
    "packaging",
    "docs",
    ".pytest_cache",
]
