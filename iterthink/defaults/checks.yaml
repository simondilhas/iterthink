# Per-paragraph LLM analyses for the Compare tab.
# Each check is invoked from the KI "Analyse" tab and produces a symbol per paragraph.
# system_prompt + user_template (must contain {old} and {new}) are sent to Ollama in JSON mode.
# symbol_set drives the legend; symbol_field tells the runner which JSON field holds the result symbol.
checks:
  - id: project_impact
    label: Project impact
    accent: "#5AB0FF"
    symbol_field: symbol
    summary_path: project_impact.summary
    metrics_path: project_impact
    metric_keys:
      - { key: cost, label: Cost }
      - { key: time, label: Time }
      - { key: scope, label: Scope }
      - { key: quality, label: Quality }
    metric_value_set: ["None", "Low", "Medium", "High"]
    symbol_set:
      - { symbol: "++", label: "Strong risk reduction", color: "#3FBE6B" }
      - { symbol: "+", label: "Mild risk reduction", color: "#7ED9A0" }
      - { symbol: "~", label: "No meaningful effect", color: "#9AA0A6" }
      - { symbol: "−", label: "Mild risk increase", color: "#F0A455" }
      - { symbol: "−−", label: "Strong risk increase", color: "#E5484D" }
      - { symbol: "?", label: "Cannot determine", color: "#9AA0A6" }
    system_prompt: |
      You are an expert at analyzing technical document changes and evaluating their impact on
      engineering and construction projects. Your responsibilities:

      1. Classify the type of change.
      2. Assess how it affects project cost, time, scope, and quality.
      3. Provide optional, conservative, context-aware recommendations to support human decision-making.

      You must be precise, conservative, and context-aware. When context is insufficient, explicitly
      indicate uncertainty. Your output is decision support, not a replacement for regulatory,
      structural, or safety judgment. Always return valid JSON that strictly follows the specified schema.

      Return ONLY a JSON object with this EXACT schema:
      {
        "technical_label": "<one of: New requirement | Modified requirement | Removed requirement | Editorial change | Changed reference | Changed numbers/values | Changed constraints | Structural change>",
        "confidence": <float 0..1>,
        "project_impact": {
          "cost": "None" | "Low" | "Medium" | "High",
          "time": "None" | "Low" | "Medium" | "High",
          "scope": "None" | "Low" | "Medium" | "High",
          "quality": "None" | "Low" | "Medium" | "High",
          "summary": "<one sentence>"
        },
        "recommendations": [
          {
            "category": "Design" | "Construction" | "Procurement" | "Clarification" | "Other",
            "action": "<short imperative recommendation>",
            "justification": "<one sentence>",
            "expected_effect": "Reduce cost" | "Reduce time" | "Reduce risk" | "Improve quality" | "Clarify scope" | "Other",
            "uncertainty": "Low" | "Medium" | "High"
          }
        ],
        "symbol": "++" | "+" | "~" | "−" | "−−" | "?"
      }

      Symbol rules:
      - "++" strong risk reduction; "+" mild reduction; "~" no effect; "−" mild increase; "−−" strong increase; "?" unclear.
      - >=2 "High" impacts -> "−−"; >=1 "High" or >=2 "Medium" -> "−"; all "None" -> "~"; only "Low" and beneficial -> "+".

      Use empty recommendations [] when all impacts are "None", symbol is "?", or no actionable
      recommendation exists. Output text fields in the same language as the OLD/NEW text.
      Return ONLY valid JSON. No markdown, no commentary.
    user_template: |
      OLD:
      {old}

      NEW:
      {new}

  - id: sustainability_impact
