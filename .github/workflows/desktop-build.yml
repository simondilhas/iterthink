name: Desktop build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional commit SHA, branch, or tag to checkout (leave empty for HEAD of the branch chosen in Use workflow from)"
        required: false
        default: ""
        type: string
      platforms:
        description: "Desktop targets to build (version tag pushes always build all three)"
        required: false
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
        default: all
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'all' }}
        run: |
          python3 <<'PY'
          import json
          import os

          platforms = os.environ["PLATFORMS"]
          all_rows = [
              {
                  "name": "linux",
                  "runner": "ubuntu-latest",
                  "flet_target": "linux",
                  "build_subdir": "linux",
                  "artifact_suffix": "linux",
              },
              {
                  "name": "windows",
                  "runner": "windows-latest",
                  "flet_target": "windows",
                  "build_subdir": "windows",
                  "artifact_suffix": "windows",
              },
              {
                  "name": "macos",
                  "runner": "macos-latest",
                  "flet_target": "macos",
                  "build_subdir": "macos",
                  "artifact_suffix": "macos",
              },
          ]
          if platforms == "all":
              rows = all_rows
          else:
              rows = [r for r in all_rows if r["name"] == platforms]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix_json={json.dumps(rows)}\n")
          PY

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev
          sudo apt-get clean

      - name: Install Rosetta (macOS, Apple Silicon)
        if: matrix.name == 'macos' && runner.arch == 'ARM64'
        continue-on-error: true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Enable long paths (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      # serious_python / Dart hit MAX_PATH when bundling onnxruntime (fastembed); default
      # GITHUB_WORKSPACE (D:\a\org\repo\...) pushes paths over 260 chars. Mirror to C:\b\w.
      - name: Mirror repo to short path (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          # Robocopy uses 0–7 for success (e.g. 1 = files copied). Invoking it via
          # Start-Process avoids that code becoming the PowerShell step exit status.
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path 'C:\b\w' | Out-Null
          $rob = Join-Path $env:SystemRoot 'System32\robocopy.exe'
          $rcArgs = @(
            $env:GITHUB_WORKSPACE, 'C:\b\w', '/E', '/MT:16', '/XJ', '/R:2', '/W:5',
            '/NFL', '/NDL', '/NJH', '/NJS', '/nc', '/ns', '/np'
          )
          $p = Start-Process -FilePath $rob -ArgumentList $rcArgs -Wait -PassThru -NoNewWindow
          $code = $p.ExitCode
          Write-Host "robocopy exit code: $code"
          if ($code -ge 8) { exit $code }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ITER_REPO=C:\b\w`n", $utf8)
          exit 0

      # serious_python runs `Process.run('tar', ...)`; flet merges `self.env['PATH']` (Flutter bin
      # + cleaned PATH from the Python that launched flet). `uv run` can start with a minimal PATH
      # without System32, so Dart never finds tar — copy tar.exe to a short prefix and prepend both.
      - name: Windows Flet host environment
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'C:\b\t' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null
          $sysTar = Join-Path $env:SystemRoot 'System32\tar.exe'
          if (-not (Test-Path -LiteralPath $sysTar)) { throw "Missing $sysTar" }
          Copy-Item -LiteralPath $sysTar -Destination 'C:\b\bin\tar.exe' -Force
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\b\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Windows\System32'
          $gitCmd = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $gitCmd) { Add-Content -Path $env:GITHUB_PATH -Value $gitCmd }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TEMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "UV_LINK_MODE=copy`n", $utf8)
          $env:PATH = 'C:\b\bin;C:\Windows\System32;' + $env:PATH
          Write-Host '--- tar (serious_python bootstrap) ---'
          where.exe tar

      - name: Set build repo path (non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: echo "ITER_REPO=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"

      - name: Sync dependencies
        working-directory: ${{ env.ITER_REPO }}
        run: uv sync

      # serious_python subprocess-calls `python3` and `pip3` on Windows; the uv-managed
      # interpreter only ships `python.exe`/`pip.exe`. Drop shims on PATH so Dart's
      # Process.run('python3', ...) / Process.run('pip3', ...) resolve.
      - name: Create python3 / pip3 shims (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $py = (uv run python -c "import sys; print(sys.executable)").Trim()
          if (-not (Test-Path -LiteralPath $py)) { throw "Could not resolve python.exe (got '$py')" }
          Write-Host "Resolved python: $py"

          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null

          # .cmd shims for callers using the bare command name
          $py3Cmd = "@echo off`r`n`"$py`" %*"
          Set-Content -LiteralPath 'C:\b\bin\python3.cmd' -Value $py3Cmd -Encoding Ascii -Force
          $pip3Cmd = "@echo off`r`n`"$py`" -m pip %*"
          Set-Content -LiteralPath 'C:\b\bin\pip3.cmd' -Value $pip3Cmd -Encoding Ascii -Force

          # .exe copy of the interpreter for callers that require an actual executable
          Copy-Item -LiteralPath $py -Destination 'C:\b\bin\python3.exe' -Force

          where.exe python3
          python3 --version
          where.exe pip3

      - name: Prefetch embedding model
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/prefetch_embed_model.py

      - name: Verify sqlite-vec embedding cache
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/verify_embedding_cache.py

      # Windows: default `bash` is System32\bash.exe (WSL stub), not Git Bash — use pwsh.
      - name: Set build version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $name = $env:GITHUB_REF_NAME
            $bv = if ($name.StartsWith('v')) { $name.Substring(1) } else { $name }
          } else {
            $bv = "0.0.0+$($env:GITHUB_RUN_NUMBER)"
          }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "BUILD_VERSION=$bv`n", $utf8)

      - name: Flet build (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:PATH = 'C:\b\bin;C:\Windows\System32;' + $env:PATH
          $g = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $g) { $env:PATH = "$g;$env:PATH" }
          Write-Host "PATH prefix (first 280 chars): $($env:PATH.Substring(0, [Math]::Min(280, $env:PATH.Length)))"
          Write-Host "--- sanity ---"
          where.exe tar
          where.exe python3
          where.exe python
          where.exe pip3
          # Pass pre-installed packages from the uv venv so serious_python skips its
          # internal pip/pip3 invocation, which fails on Windows (python3 not found).
          uv run flet build windows --yes -vv `
            --site-packages-dir "$($env:ITER_REPO)\.venv\Lib\site-packages" `
            --build-version $env:BUILD_VERSION `
            --build-number $env:GITHUB_RUN_NUMBER

      - name: Flet build (macOS / Linux)
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          uv run flet build "${{ matrix.flet_target }}" --yes --verbose \
            --build-version "${BUILD_VERSION}" \
            --build-number "${GITHUB_RUN_NUMBER}"

      - name: Zip build output
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          uv run python -c "import os, shutil; ws=os.environ['ITER_REPO']; bv=os.environ['BUILD_VERSION']; suf=os.environ['SUFFIX']; sub=os.environ['SUBDIR']; src=os.path.join(ws,'build',sub); dst=os.path.join(ws,f'iterthink-{bv}-{suf}'); shutil.make_archive(dst,'zip',src)"
        env:
          ITER_REPO: ${{ env.ITER_REPO }}
          SUFFIX: ${{ matrix.artifact_suffix }}
          SUBDIR: ${{ matrix.build_subdir }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: ${{ env.ITER_REPO }}/iterthink-${{ env.BUILD_VERSION }}-${{ matrix.artifact_suffix }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: desktop-*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Iterthink ${{ github.ref_name }}
          generate_release_notes: true
          files: assets/*.zip
          replace_assets: true