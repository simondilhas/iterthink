name: Desktop build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional commit SHA, branch, or tag to checkout (leave empty for HEAD of the branch chosen in Use workflow from)"
        required: false
        default: ""
        type: string
      platforms:
        description: "Desktop targets to build (version tag pushes always build all three)"
        required: false
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
        default: all
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'all' }}
        run: |
          python3 <<'PY'
          import json
          import os

          platforms = os.environ["PLATFORMS"]
          all_rows = [
              {
                  "name": "linux",
                  "runner": "ubuntu-latest",
                  "flet_target": "linux",
                  "build_subdir": "linux",
                  "artifact_suffix": "linux",
              },
              {
                  "name": "windows",
                  "runner": "windows-latest",
                  "flet_target": "windows",
                  "build_subdir": "windows",
                  "artifact_suffix": "windows",
              },
              {
                  "name": "macos",
                  "runner": "macos-latest",
                  "flet_target": "macos",
                  "build_subdir": "macos",
                  "artifact_suffix": "macos",
              },
          ]
          if platforms == "all":
              rows = all_rows
          else:
              rows = [r for r in all_rows if r["name"] == platforms]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix_json={json.dumps(rows)}\n")
          PY

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev
          sudo apt-get clean

      - name: Install Rosetta (macOS, Apple Silicon)
        if: matrix.name == 'macos' && runner.arch == 'ARM64'
        continue-on-error: true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Sync dependencies
        run: uv sync

      - name: Prefetch embedding model
        run: uv run python scripts/prefetch_embed_model.py

      - name: Verify sqlite-vec embedding cache
        run: uv run python scripts/verify_embedding_cache.py

      - name: Set build version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "BUILD_VERSION=0.0.0+${GITHUB_RUN_NUMBER}" >> "${GITHUB_ENV}"
          fi

      - name: Flet build
        shell: bash
        run: |
          set -euo pipefail
          uv run flet build "${{ matrix.flet_target }}" --yes --verbose \
            --build-version "${BUILD_VERSION}" \
            --build-number "${GITHUB_RUN_NUMBER}"

      - name: Zip build output
        shell: bash
        run: |
          set -euo pipefail
          uv run python -c "
          import os, shutil
          ws = os.environ['GITHUB_WORKSPACE']
          bv = os.environ['BUILD_VERSION']
          suf = os.environ['SUFFIX']
          sub = os.environ['SUBDIR']
          src = os.path.join(ws, 'build', sub)
          dst = os.path.join(ws, f'iterthink-{bv}-{suf}')
          shutil.make_archive(dst, 'zip', src)
          "
        env:
          SUFFIX: ${{ matrix.artifact_suffix }}
          SUBDIR: ${{ matrix.build_subdir }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: ${{ github.workspace }}/iterthink-${{ env.BUILD_VERSION }}-${{ matrix.artifact_suffix }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: desktop-*
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Iterthink ${{ github.ref_name }}
          generate_release_notes: true
          files: assets/*.zip
          replace_assets: true
