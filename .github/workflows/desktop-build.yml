name: Desktop build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional commit SHA, branch, or tag to checkout (leave empty for HEAD of the branch chosen in Use workflow from)"
        required: false
        default: ""
        type: string
      platforms:
        description: "Desktop targets to build (version tag pushes always build all three)"
        required: false
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
        default: all
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'all' }}
        run: |
          python3 <<'PY'
          import json
          import os

          platforms = os.environ["PLATFORMS"]
          all_rows = [
              {
                  "name": "linux",
                  "runner": "ubuntu-latest",
                  "flet_target": "linux",
                  "build_subdir": "linux",
                  "artifact_suffix": "linux",
              },
              {
                  "name": "windows",
                  "runner": "windows-latest",
                  "flet_target": "windows",
                  "build_subdir": "windows",
                  "artifact_suffix": "windows",
              },
              {
                  "name": "macos",
                  "runner": "macos-latest",
                  "flet_target": "macos",
                  "build_subdir": "macos",
                  "artifact_suffix": "macos",
              },
          ]
          if platforms == "all":
              rows = all_rows
          else:
              rows = [r for r in all_rows if r["name"] == platforms]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix_json={json.dumps(rows)}\n")
          PY

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev \
            file
          sudo apt-get clean

      - name: Install Rosetta (macOS, Apple Silicon)
        if: matrix.name == 'macos' && runner.arch == 'ARM64'
        continue-on-error: true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Enable long paths (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Mirror repo to short path (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path 'C:\b\w' | Out-Null
          $rob = Join-Path $env:SystemRoot 'System32\robocopy.exe'
          $rcArgs = @(
            $env:GITHUB_WORKSPACE, 'C:\b\w', '/E', '/MT:16', '/XJ', '/R:2', '/W:5',
            '/NFL', '/NDL', '/NJH', '/NJS', '/nc', '/ns', '/np'
          )
          $p = Start-Process -FilePath $rob -ArgumentList $rcArgs -Wait -PassThru -NoNewWindow
          $code = $p.ExitCode
          Write-Host "robocopy exit code: $code"
          if ($code -ge 8) { exit $code }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ITER_REPO=C:\b\w`n", $utf8)
          exit 0

      - name: Windows Flet host environment
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'C:\b\t' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null
          $sysTar = Join-Path $env:SystemRoot 'System32\tar.exe'
          if (-not (Test-Path -LiteralPath $sysTar)) { throw "Missing $sysTar" }
          Copy-Item -LiteralPath $sysTar -Destination 'C:\b\bin\tar.exe' -Force
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\b\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Windows\System32'
          $gitCmd = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $gitCmd) { Add-Content -Path $env:GITHUB_PATH -Value $gitCmd }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TEMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "UV_LINK_MODE=copy`n", $utf8)
          $env:PATH = 'C:\b\bin;C:\Windows\System32;' + $env:PATH
          Write-Host '--- tar (serious_python bootstrap) ---'
          where.exe tar

      - name: Set build repo path (non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: echo "ITER_REPO=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"

      - name: Patch pyproject.toml version specifiers
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $path = Join-Path $env:ITER_REPO 'pyproject.toml'
          if (-not (Test-Path -LiteralPath $path)) { throw "pyproject.toml not found at $path" }
          $orig = Get-Content -LiteralPath $path -Raw
          $patched = [regex]::Replace($orig, '(?<! )<', ' <')
          if ($patched -ne $orig) {
            Set-Content -LiteralPath $path -Value $patched -NoNewline -Encoding utf8
            Write-Host "Patched pyproject.toml — inserted space before '<' in version specifiers."
          } else {
            Write-Host "pyproject.toml already has spaces before every '<' — no change."
          }

      - name: Sync dependencies
        working-directory: ${{ env.ITER_REPO }}
        run: uv sync

      - name: Prefetch embedding model
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/prefetch_embed_model.py

      - name: Verify sqlite-vec embedding cache
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/verify_embedding_cache.py

      - name: Strip .venv from build source (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $venv = Join-Path $env:ITER_REPO '.venv'
          if (Test-Path -LiteralPath $venv) {
            Write-Host "Removing $venv"
            cmd /c "rmdir /s /q `"$venv`""
            if (Test-Path -LiteralPath $venv) { throw "Failed to remove $venv" }
          } else {
            Write-Host "No .venv to remove."
          }
          Get-ChildItem -LiteralPath $env:ITER_REPO -Recurse -Force -Directory `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq '__pycache__' } |
            ForEach-Object {
              cmd /c "rmdir /s /q `"$($_.FullName)`"" | Out-Null
            }

      - name: Create python / python3 / pip3 shims (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $candidates = @(
            'C:\hostedtoolcache\windows\Python\3.12.10\x64\python.exe'
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path -LiteralPath $c) { $found = $c; break }
          }
          if (-not $found) {
            $found = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64\python.exe' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $found -or -not (Test-Path -LiteralPath $found)) {
            throw "Could not locate a python.exe in C:\hostedtoolcache\windows\Python\"
          }
          Write-Host "Resolved python: $found"

          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null

          Copy-Item -LiteralPath $found -Destination 'C:\b\bin\python3.exe' -Force
          Copy-Item -LiteralPath $found -Destination 'C:\b\bin\python.exe' -Force

          $pyDir = Split-Path -Parent $found
          $pipExe = Join-Path $pyDir 'Scripts\pip.exe'
          if (Test-Path -LiteralPath $pipExe) {
            Copy-Item -LiteralPath $pipExe -Destination 'C:\b\bin\pip3.exe' -Force
            Copy-Item -LiteralPath $pipExe -Destination 'C:\b\bin\pip.exe' -Force
          }

          where.exe python
          where.exe python3
          python --version
          python3 --version
          where.exe pip3

      - name: Set build version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $name = $env:GITHUB_REF_NAME
            $bv = if ($name.StartsWith('v')) { $name.Substring(1) } else { $name }
          } else {
            $bv = "0.0.0+$($env:GITHUB_RUN_NUMBER)"
          }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "BUILD_VERSION=$bv`n", $utf8)

      - name: Pre-build source audit (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          Write-Host "--- top-level entries ---"
          Get-ChildItem -Force -LiteralPath $env:ITER_REPO | Select-Object Mode, LastWriteTime, Length, Name
          Write-Host "--- .venv presence ---"
          if (Test-Path -LiteralPath (Join-Path $env:ITER_REPO '.venv')) { Write-Host '.venv STILL PRESENT' } else { Write-Host '.venv absent (good)' }
          Write-Host "--- embedded_models directory tree (depth 4) ---"
          $embPath = Join-Path $env:ITER_REPO 'iterthink\embedded_models'
          if (Test-Path -LiteralPath $embPath) {
            Get-ChildItem -Recurse -Depth 4 -Force -LiteralPath $embPath -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table -AutoSize | Out-String -Width 4096 | Write-Host
          } else {
            Write-Host "embedded_models directory does not exist at $embPath"
          }
          Write-Host "--- total source size ---"
          $size = (Get-ChildItem -Recurse -Force -LiteralPath $env:ITER_REPO -ErrorAction SilentlyContinue | Measure-Object -Property Length -Sum).Sum
          "{0:N1} MB" -f ($size / 1MB)

      - name: Flet build (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hostedPy = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          $parts = @()
          if ($hostedPy -and (Test-Path -LiteralPath $hostedPy)) {
            $parts += $hostedPy
            $parts += (Join-Path $hostedPy 'Scripts')
          }
          $parts += 'C:\b\bin'
          $parts += 'C:\Windows\System32'
          $g = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $g) { $parts = ,$g + $parts }
          $env:PATH = ($parts -join ';') + ';' + $env:PATH
          Write-Host "PATH prefix (first 280 chars): $($env:PATH.Substring(0, [Math]::Min(280, $env:PATH.Length)))"
          Write-Host "--- sanity ---"
          where.exe tar
          where.exe python
          where.exe python3
          where.exe pip3
          uvx --from flet-cli flet build windows --yes -vv `
            --build-version $env:BUILD_VERSION `
            --build-number $env:GITHUB_RUN_NUMBER 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "flet build exited with code $LASTEXITCODE"
            Write-Host "--- build dir tree (depth 3) ---"
            if (Test-Path -LiteralPath (Join-Path $env:ITER_REPO 'build')) {
              Get-ChildItem -Recurse -Depth 3 -LiteralPath (Join-Path $env:ITER_REPO 'build') -ErrorAction SilentlyContinue |
                Select-Object FullName | Format-Table -AutoSize | Out-String -Width 4096 | Write-Host
            }
            exit $LASTEXITCODE
          }

      - name: Flet build (macOS / Linux)
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: bash
        run: |
          set -euo pipefail
          uv run flet build "${{ matrix.flet_target }}" --yes --verbose \
            --build-version "${BUILD_VERSION}" \
            --build-number "${GITHUB_RUN_NUMBER}"

      # ==================== PACKAGING ====================

      - name: Create Windows installer (Inno Setup)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          
          # Download and install Inno Setup
          $innoUrl = 'https://jrsoftware.org/download.php/is.exe'
          $innoInstaller = 'C:\b\t\innosetup.exe'
          Write-Host "Downloading Inno Setup..."
          Invoke-WebRequest -Uri $innoUrl -OutFile $innoInstaller
          Write-Host "Installing Inno Setup..."
          Start-Process -FilePath $innoInstaller -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait
          
          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "Inno Setup not found at $iscc" }
          
          # Create Inno Setup script
          $buildDir = Join-Path $env:ITER_REPO "build\windows"
          $exeName = "iterthink.exe"
          $appName = "Iterthink"
          $version = $env:BUILD_VERSION
          
          $issContent = @"
[Setup]
AppName=$appName
AppVersion=$version
DefaultDirName={autopf}\$appName
DefaultGroupName=$appName
OutputDir=$env:ITER_REPO
OutputBaseFilename=iterthink-$version-windows-installer
Compression=lzma2
SolidCompression=yes
ArchitecturesInstallIn64BitMode=x64
DisableProgramGroupPage=yes
PrivilegesRequired=lowest

[Files]
Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: "{group}\$appName"; Filename: "{app}\$exeName"
Name: "{autodesktop}\$appName"; Filename: "{app}\$exeName"

[Run]
Filename: "{app}\$exeName"; Description: "Launch $appName"; Flags: nowait postinstall skipifsilent
"@
          
          $issPath = Join-Path $env:ITER_REPO 'installer.iss'
          Set-Content -LiteralPath $issPath -Value $issContent -Encoding UTF8
          
          Write-Host "Building installer..."
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }
          
          Write-Host "Installer created successfully"

      - name: Create Linux AppImage
        if: matrix.name == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          
          BUILD_DIR="${ITER_REPO}/build/linux"
          APPDIR="${ITER_REPO}/AppDir"
          
          # Find the main executable
          MAIN_EXEC=$(find "$BUILD_DIR" -maxdepth 1 -type f -executable -name "iterthink" | head -n1)
          if [ -z "$MAIN_EXEC" ]; then
            echo "Error: Could not find main executable"
            exit 1
          fi
          
          echo "Found executable: $MAIN_EXEC"
          
          # Create AppDir structure
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib"
          
          # Copy all build output to AppDir
          cp -r "$BUILD_DIR"/* "$APPDIR/usr/bin/"
          
          # Create .desktop file
          cat > "$APPDIR/iterthink.desktop" <<EOF
[Desktop Entry]
Type=Application
Name=Iterthink
Exec=iterthink
Icon=iterthink
Categories=Utility;
Terminal=false
EOF
          
          # Create icon (use a default if none exists)
          if [ -f "${ITER_REPO}/icon.png" ]; then
            cp "${ITER_REPO}/icon.png" "$APPDIR/iterthink.png"
          else
            # Create a simple placeholder icon
            convert -size 256x256 xc:blue "$APPDIR/iterthink.png" 2>/dev/null || \
            touch "$APPDIR/iterthink.png"
          fi
          
          # Create AppRun
          cat > "$APPDIR/AppRun" <<'EOF'
#!/bin/bash
SELF=$(readlink -f "$0")
HERE=${SELF%/*}
export PATH="${HERE}/usr/bin:${PATH}"
export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
cd "${HERE}/usr/bin"
exec "./iterthink" "$@"
EOF
          chmod +x "$APPDIR/AppRun"
          
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          
          # Build AppImage
          ARCH=x86_64 /tmp/appimagetool "$APPDIR" "${ITER_REPO}/iterthink-${BUILD_VERSION}-linux-x86_64.AppImage"
          
          echo "AppImage created successfully"

      - name: Create macOS DMG
        if: matrix.name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          
          BUILD_DIR="${ITER_REPO}/build/macos"
          APP_BUNDLE=$(find "$BUILD_DIR" -maxdepth 1 -name "*.app" | head -n1)
          
          if [ -z "$APP_BUNDLE" ]; then
            echo "Error: Could not find .app bundle"
            exit 1
          fi
          
          echo "Found app bundle: $APP_BUNDLE"
          
          DMG_NAME="iterthink-${BUILD_VERSION}-macos.dmg"
          
          # Create DMG
          hdiutil create -volname "Iterthink" \
            -srcfolder "$APP_BUNDLE" \
            -ov \
            -format UDZO \
            "${ITER_REPO}/${DMG_NAME}"
          
          echo "DMG created successfully: ${DMG_NAME}"

      # ==================== UPLOAD ARTIFACTS ====================

      - name: Upload Windows installer
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.ITER_REPO }}/iterthink-${{ env.BUILD_VERSION }}-windows-installer.exe
          if-no-files-found: error

      - name: Upload Linux AppImage
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: ${{ env.ITER_REPO }}/iterthink-${{ env.BUILD_VERSION }}-linux-x86_64.AppImage
          if-no-files-found: error

      - name: Upload macOS DMG
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.ITER_REPO }}/iterthink-${{ env.BUILD_VERSION }}-macos.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Iterthink ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          replace_assets: true
