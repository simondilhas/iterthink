name: Desktop build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: >
          Optional SHA, branch, or tag (workflow_dispatch only). Must exist on origin
          before you run this — create and push tags first, e.g. git push origin v0.0.2.
          Leave empty to build the commit at the tip of the branch chosen under "Use workflow from".
        required: false
        default: ""
        type: string
      platforms:
        description: "Desktop targets to build"
        required: false
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
        default: all
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'all' }}
        run: |
          python3 <<'PY'
          import json
          import os

          platforms = os.environ["PLATFORMS"]
          all_rows = [
              {
                  "name": "linux",
                  "runner": "ubuntu-latest",
                  "flet_target": "linux",
                  "build_subdir": "linux",
              },
              {
                  "name": "windows",
                  "runner": "windows-latest",
                  "flet_target": "windows",
                  "build_subdir": "windows",
              },
              {
                  "name": "macos",
                  "runner": "macos-latest",
                  "flet_target": "macos",
                  "build_subdir": "macos",
              },
          ]
          if platforms == "all":
              rows = all_rows
          else:
              rows = [r for r in all_rows if r["name"] == platforms]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix_json={json.dumps(rows)}\n")
          PY

  # Hugging Face from macOS runners often flakes (DNS: nodename nor servname not known).
  # Download once on Linux; matrix jobs only unpack the artifact.
  prefetch_embed:
    name: Prefetch embedding model
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      # Same ref resolution as build so the ONNX bundle matches the commit being packaged.
      - name: Resolve checkout ref
        id: checkout_ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "workflow_dispatch" ] || [ -z "${INPUT_REF:-}" ]; then
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          r="$INPUT_REF"
          if [[ "$r" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
            echo "ref=refs/tags/$r" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$r" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}

      - uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync

      - name: Prefetch embedding model
        run: uv run python scripts/prefetch_embed_model.py

      - uses: actions/upload-artifact@v4
        with:
          name: embedded-models
          path: iterthink/embedded_models
          if-no-files-found: error

  build:
    name: Build (${{ matrix.name }})
    needs:
      - prepare
      - prefetch_embed
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix_json) }}

    steps:
      # Map release-style tags (v0.0.2) to refs/tags/... so checkout uses one refspec.
      # Unqualified refs make actions/checkout fetch refs/heads/<ref>* and refs/tags/<ref>*;
      # if nothing matches (tag never pushed), git fetch exits 1 with no helpful message.
      - name: Resolve checkout ref
        id: checkout_ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REF: ${{ inputs.ref }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "workflow_dispatch" ] || [ -z "${INPUT_REF:-}" ]; then
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          r="$INPUT_REF"
          if [[ "$r" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
            echo "ref=refs/tags/$r" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$r" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev \
            file imagemagick rpm ruby ruby-dev build-essential
          sudo apt-get clean

      - name: Install fpm (Linux)
        if: matrix.name == 'linux'
        run: sudo gem install --no-document fpm

      - name: Install Rosetta (macOS, Apple Silicon)
        if: matrix.name == 'macos' && runner.arch == 'ARM64'
        continue-on-error: true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Enable long paths (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Mirror repo to short path (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path 'C:\b\w' | Out-Null
          $rob = Join-Path $env:SystemRoot 'System32\robocopy.exe'
          $rcArgs = @(
            $env:GITHUB_WORKSPACE, 'C:\b\w', '/E', '/MT:16', '/XJ', '/R:2', '/W:5',
            '/NFL', '/NDL', '/NJH', '/NJS', '/nc', '/ns', '/np'
          )
          $p = Start-Process -FilePath $rob -ArgumentList $rcArgs -Wait -PassThru -NoNewWindow
          $code = $p.ExitCode
          Write-Host "robocopy exit code: $code"
          if ($code -ge 8) { exit $code }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ITER_REPO=C:\b\w`n", $utf8)
          exit 0

      - name: Windows Flet host environment
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'C:\b\t' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null
          $sysTar = Join-Path $env:SystemRoot 'System32\tar.exe'
          if (-not (Test-Path -LiteralPath $sysTar)) { throw "Missing $sysTar" }
          Copy-Item -LiteralPath $sysTar -Destination 'C:\b\bin\tar.exe' -Force
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\b\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Windows\System32'
          $gitCmd = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $gitCmd) { Add-Content -Path $env:GITHUB_PATH -Value $gitCmd }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TEMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "UV_LINK_MODE=copy`n", $utf8)
          $env:PATH = 'C:\b\bin;C:\Windows\System32;' + $env:PATH
          Write-Host '--- tar (serious_python bootstrap) ---'
          where.exe tar

      - name: Set build repo path (non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: echo "ITER_REPO=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"

      - name: Patch pyproject.toml version specifiers
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $path = Join-Path $env:ITER_REPO 'pyproject.toml'
          if (-not (Test-Path -LiteralPath $path)) { throw "pyproject.toml not found at $path" }
          $orig = Get-Content -LiteralPath $path -Raw
          $patched = [regex]::Replace($orig, '(?<! )<', ' <')
          if ($patched -ne $orig) {
            Set-Content -LiteralPath $path -Value $patched -NoNewline -Encoding utf8
            Write-Host "Patched pyproject.toml"
          }

      - name: Sync dependencies
        working-directory: ${{ env.ITER_REPO }}
        run: uv sync

      - name: Download prefetched embedding model
        if: matrix.name != 'windows'
        uses: actions/download-artifact@v4
        with:
          name: embedded-models
          path: ${{ github.workspace }}/iterthink/embedded_models

      - name: Verify sqlite-vec embedding cache
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/verify_embedding_cache.py

      - name: Strip .venv (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $venv = Join-Path $env:ITER_REPO '.venv'
          if (Test-Path $venv) {
            cmd /c "rmdir /s /q `"$venv`""
          }
          Get-ChildItem $env:ITER_REPO -Recurse -Force -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq '__pycache__' } |
            ForEach-Object { cmd /c "rmdir /s /q `"$($_.FullName)`"" }

      - name: Create python shims (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $py = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64\python.exe' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $py) { throw "Python not found" }
          Copy-Item $py 'C:\b\bin\python3.exe' -Force
          Copy-Item $py 'C:\b\bin\python.exe' -Force
          $pip = Join-Path (Split-Path $py) 'Scripts\pip.exe'
          if (Test-Path $pip) {
            Copy-Item $pip 'C:\b\bin\pip3.exe' -Force
            Copy-Item $pip 'C:\b\bin\pip.exe' -Force
          }

      - name: Set build version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $bv = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $bv = "0.0.0+$($env:GITHUB_RUN_NUMBER)"
          }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "BUILD_VERSION=$bv`n", $utf8)

      # Flet resolves launcher icons from <tool.flet.app path>/assets/icon.* (PNG for flutter_launcher_icons).
      - name: Stage Flet launcher icon
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:ITER_REPO 'iterthink/assets/fav.png'
          if (-not (Test-Path -LiteralPath $src)) { throw "Missing launcher icon source: $src" }
          $destDir = Join-Path $env:ITER_REPO 'assets'
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item -LiteralPath $src -Destination (Join-Path $destDir 'icon.png') -Force

      - name: Flet build (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $hostedPy = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64' | Select-Object -First 1).FullName
          $env:PATH = "$hostedPy;$hostedPy\Scripts;C:\b\bin;C:\Windows\System32;C:\Program Files\Git\cmd;$env:PATH"
          uvx --from flet-cli flet build windows --yes -vv --build-version $env:BUILD_VERSION --build-number $env:GITHUB_RUN_NUMBER

      - name: Flet build (macOS / Linux)
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: |
          uv run flet build "${{ matrix.flet_target }}" --yes --verbose \
            --build-version "${BUILD_VERSION}" --build-number "${GITHUB_RUN_NUMBER}"

      # ===== PACKAGING =====
      # All final installers/packages go into ./dist (relative to GITHUB_WORKSPACE)
      # so upload-artifact@v4 can find them under a single common ancestor.

      - name: Install Inno Setup (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package Windows installer
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $buildDir = Join-Path $env:ITER_REPO 'build\windows'
          if (-not (Test-Path $buildDir)) {
            throw "Build output not found at $buildDir"
          }
          Write-Host "Packaging from: $buildDir"

          # Output the installer into the GitHub workspace so upload-artifact can find it.
          $outDir = Join-Path $env:GITHUB_WORKSPACE 'dist'
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $icoPath = Join-Path $outDir 'setup-icon.ico'
          $env:ITERSETUP_ICO_OUT = $icoPath
          Push-Location $env:ITER_REPO
          try {
            uv run python -c "import os; from pathlib import Path; from PIL import Image; d=Path(os.environ['ITERSETUP_ICO_OUT']); im=Image.open(Path(os.environ['ITER_REPO'])/'iterthink'/'assets'/'fav.png').convert('RGBA').resize((256,256)); im.save(d, format='ICO')"
          } finally {
            Pop-Location
            Remove-Item Env:ITERSETUP_ICO_OUT -ErrorAction SilentlyContinue
          }
          if (-not (Test-Path -LiteralPath $icoPath)) { throw "Failed to write installer icon: $icoPath" }

          $iss = @"
          [Setup]
          AppName=Iterthink
          AppVersion=$env:BUILD_VERSION
          DefaultDirName={autopf}\Iterthink
          DefaultGroupName=Iterthink
          OutputDir=$outDir
          OutputBaseFilename=iterthink-$env:BUILD_VERSION-windows-installer
          SetupIconFile=$icoPath
          Compression=lzma2
          SolidCompression=yes
          DisableProgramGroupPage=yes
          PrivilegesRequired=lowest
          ArchitecturesInstallIn64BitMode=x64compatible

          [Files]
          Source: "$buildDir\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Iterthink"; Filename: "{app}\iterthink.exe"
          Name: "{autodesktop}\Iterthink"; Filename: "{app}\iterthink.exe"
          "@

          $issPath = Join-Path $env:ITER_REPO 'installer.iss'
          Set-Content -LiteralPath $issPath -Value $iss -Encoding UTF8
          Write-Host "Wrote installer script: $issPath"

          $iscc = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }

          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $installer = Get-ChildItem -Path $outDir -Filter 'iterthink-*-windows-installer.exe' | Select-Object -First 1
          if (-not $installer) { throw "Installer was not produced" }
          Write-Host "Built installer: $($installer.FullName)"

      - name: Package Linux AppImage
        if: matrix.name == 'linux'
        run: |
          set -euo pipefail

          mkdir -p dist

          # Ubuntu 24.04 runners don't ship libfuse2, so the appimagetool AppImage
          # can't self-mount. Extract it and run the inner binary instead.
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool.AppImage
          chmod +x /tmp/appimagetool.AppImage
          (cd /tmp && ./appimagetool.AppImage --appimage-extract >/dev/null)
          APPIMAGETOOL=/tmp/squashfs-root/AppRun

          mkdir -p AppDir/usr/bin
          cp -r build/linux/* AppDir/usr/bin/

          cat > AppDir/iterthink.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Iterthink
          Exec=iterthink
          Icon=iterthink
          Categories=Utility;
          DESKTOP

          ICON_SRC="${ITER_REPO}/iterthink/assets/fav.png"
          if [ ! -f "$ICON_SRC" ]; then
            echo "Missing icon source: $ICON_SRC" >&2
            exit 1
          fi
          # ImageMagick 7 uses `magick`; ImageMagick 6 uses `convert`
          if command -v magick >/dev/null 2>&1; then
            magick "$ICON_SRC" -resize 256x256 AppDir/iterthink.png
          elif command -v convert >/dev/null 2>&1; then
            convert "$ICON_SRC" -resize 256x256 AppDir/iterthink.png
          else
            echo "No ImageMagick available" >&2
            exit 1
          fi

          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/iterthink" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Run the extracted binary — no FUSE needed
          ARCH=x86_64 "$APPIMAGETOOL" AppDir "dist/iterthink-${BUILD_VERSION}-linux-x86_64.AppImage"

      - name: Package Fedora RPM
        if: matrix.name == 'linux'
        run: |
          set -euo pipefail

          mkdir -p dist

          STAGE="$(mktemp -d)"
          mkdir -p \
            "$STAGE/usr/lib/iterthink" \
            "$STAGE/usr/bin" \
            "$STAGE/usr/share/applications" \
            "$STAGE/usr/share/icons/hicolor/256x256/apps"

          # App payload
          cp -r build/linux/* "$STAGE/usr/lib/iterthink/"

          # Launcher symlink (so `iterthink` is on PATH)
          ln -s /usr/lib/iterthink/iterthink "$STAGE/usr/bin/iterthink"

          # Desktop entry
          cat > "$STAGE/usr/share/applications/iterthink.desktop" <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Iterthink
          Exec=iterthink
          Icon=iterthink
          Categories=Utility;
          DESKTOP

          # Icon: reuse the AppImage one if it exists, else resize from package asset
          if [ -f AppDir/iterthink.png ]; then
            cp AppDir/iterthink.png "$STAGE/usr/share/icons/hicolor/256x256/apps/iterthink.png"
          elif command -v magick >/dev/null 2>&1; then
            magick "${ITER_REPO}/iterthink/assets/fav.png" -resize 256x256 "$STAGE/usr/share/icons/hicolor/256x256/apps/iterthink.png"
          else
            convert "${ITER_REPO}/iterthink/assets/fav.png" -resize 256x256 "$STAGE/usr/share/icons/hicolor/256x256/apps/iterthink.png"
          fi

          # RPM versions can't contain '+', sanitize
          RPM_VERSION="${BUILD_VERSION//+/.}"

          fpm -s dir -t rpm \
            -n iterthink \
            -v "$RPM_VERSION" \
            --license "Proprietary" \
            --description "Iterthink desktop app" \
            --rpm-summary "Iterthink" \
            --depends gtk3 \
            --depends libsecret \
            --depends mpv-libs \
            -p "dist/iterthink-${BUILD_VERSION}-fedora-x86_64.rpm" \
            -C "$STAGE" \
            usr

          ls -la dist/

      - name: Package macOS DMG
        if: matrix.name == 'macos'
        run: |
          set -euo pipefail
          mkdir -p dist
          APP=$(find build/macos -name "*.app" | head -n1)
          hdiutil create -volname "Iterthink" -srcfolder "$APP" -ov -format UDZO "dist/iterthink-${BUILD_VERSION}-macos.dmg"

      - name: List artifacts (debug)
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath 'dist') {
            Write-Host '--- dist/ contents ---'
            Get-ChildItem -LiteralPath 'dist' -Force
          } else {
            Write-Host "No dist/ directory found in $(Get-Location)"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-package
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Iterthink ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
