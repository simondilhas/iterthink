name: Desktop build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional commit SHA, branch, or tag to checkout"
        required: false
        default: ""
        type: string
      platforms:
        description: "Desktop targets to build"
        required: false
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
        default: all
  push:
    tags:
      - "v*"

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_json: ${{ steps.matrix.outputs.matrix_json }}
    steps:
      - id: matrix
        shell: bash
        env:
          PLATFORMS: ${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'all' }}
        run: |
          python3 <<'PY'
          import json
          import os

          platforms = os.environ["PLATFORMS"]
          all_rows = [
              {
                  "name": "linux",
                  "runner": "ubuntu-latest",
                  "flet_target": "linux",
                  "build_subdir": "linux",
              },
              {
                  "name": "windows",
                  "runner": "windows-latest",
                  "flet_target": "windows",
                  "build_subdir": "windows",
              },
              {
                  "name": "macos",
                  "runner": "macos-latest",
                  "flet_target": "macos",
                  "build_subdir": "macos",
              },
          ]
          if platforms == "all":
              rows = all_rows
          else:
              rows = [r for r in all_rows if r["name"] == platforms]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"matrix_json={json.dumps(rows)}\n")
          PY

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix_json) }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update --allow-releaseinfo-change
          sudo apt-get install -y --no-install-recommends \
            clang ninja-build libgtk-3-dev libasound2-dev libmpv-dev mpv \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav gstreamer1.0-tools gstreamer1.0-x gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 \
            gstreamer1.0-qt5 gstreamer1.0-pulseaudio pkg-config libsecret-1-0 libsecret-1-dev \
            file imagemagick
          sudo apt-get clean

      - name: Install Rosetta (macOS, Apple Silicon)
        if: matrix.name == 'macos' && runner.arch == 'ARM64'
        continue-on-error: true
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Enable long paths (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Mirror repo to short path (Windows)
        if: matrix.name == 'windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          New-Item -ItemType Directory -Force -Path 'C:\b\w' | Out-Null
          $rob = Join-Path $env:SystemRoot 'System32\robocopy.exe'
          $rcArgs = @(
            $env:GITHUB_WORKSPACE, 'C:\b\w', '/E', '/MT:16', '/XJ', '/R:2', '/W:5',
            '/NFL', '/NDL', '/NJH', '/NJS', '/nc', '/ns', '/np'
          )
          $p = Start-Process -FilePath $rob -ArgumentList $rcArgs -Wait -PassThru -NoNewWindow
          $code = $p.ExitCode
          Write-Host "robocopy exit code: $code"
          if ($code -ge 8) { exit $code }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "ITER_REPO=C:\b\w`n", $utf8)
          exit 0

      - name: Windows Flet host environment
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path 'C:\b\t' | Out-Null
          New-Item -ItemType Directory -Force -Path 'C:\b\bin' | Out-Null
          $sysTar = Join-Path $env:SystemRoot 'System32\tar.exe'
          if (-not (Test-Path -LiteralPath $sysTar)) { throw "Missing $sysTar" }
          Copy-Item -LiteralPath $sysTar -Destination 'C:\b\bin\tar.exe' -Force
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\b\bin'
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Windows\System32'
          $gitCmd = 'C:\Program Files\Git\cmd'
          if (Test-Path -LiteralPath $gitCmd) { Add-Content -Path $env:GITHUB_PATH -Value $gitCmd }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TEMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TMP=C:\b\t`n", $utf8)
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "UV_LINK_MODE=copy`n", $utf8)
          $env:PATH = 'C:\b\bin;C:\Windows\System32;' + $env:PATH
          Write-Host '--- tar (serious_python bootstrap) ---'
          where.exe tar

      - name: Set build repo path (non-Windows)
        if: matrix.name != 'windows'
        shell: bash
        run: echo "ITER_REPO=${GITHUB_WORKSPACE}" >> "${GITHUB_ENV}"

      - name: Patch pyproject.toml version specifiers
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $path = Join-Path $env:ITER_REPO 'pyproject.toml'
          if (-not (Test-Path -LiteralPath $path)) { throw "pyproject.toml not found at $path" }
          $orig = Get-Content -LiteralPath $path -Raw
          $patched = [regex]::Replace($orig, '(?<! )<', ' <')
          if ($patched -ne $orig) {
            Set-Content -LiteralPath $path -Value $patched -NoNewline -Encoding utf8
            Write-Host "Patched pyproject.toml"
          }

      - name: Sync dependencies
        working-directory: ${{ env.ITER_REPO }}
        run: uv sync

      - name: Prefetch embedding model
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/prefetch_embed_model.py

      - name: Verify sqlite-vec embedding cache
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: uv run python scripts/verify_embedding_cache.py

      - name: Strip .venv (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $venv = Join-Path $env:ITER_REPO '.venv'
          if (Test-Path $venv) {
            cmd /c "rmdir /s /q `"$venv`""
          }
          Get-ChildItem $env:ITER_REPO -Recurse -Force -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq '__pycache__' } |
            ForEach-Object { cmd /c "rmdir /s /q `"$($_.FullName)`"" }

      - name: Create python shims (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          $py = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64\python.exe' -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $py) { throw "Python not found" }
          Copy-Item $py 'C:\b\bin\python3.exe' -Force
          Copy-Item $py 'C:\b\bin\python.exe' -Force
          $pip = Join-Path (Split-Path $py) 'Scripts\pip.exe'
          if (Test-Path $pip) {
            Copy-Item $pip 'C:\b\bin\pip3.exe' -Force
            Copy-Item $pip 'C:\b\bin\pip.exe' -Force
          }

      - name: Set build version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $bv = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $bv = "0.0.0+$($env:GITHUB_RUN_NUMBER)"
          }
          $utf8 = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "BUILD_VERSION=$bv`n", $utf8)

      - name: Flet build (Windows)
        if: matrix.name == 'windows'
        working-directory: ${{ env.ITER_REPO }}
        shell: pwsh
        run: |
          $hostedPy = (Get-ChildItem 'C:\hostedtoolcache\windows\Python\3.12.*\x64' | Select-Object -First 1).FullName
          $env:PATH = "$hostedPy;$hostedPy\Scripts;C:\b\bin;C:\Windows\System32;C:\Program Files\Git\cmd;$env:PATH"
          uvx --from flet-cli flet build windows --yes -vv --build-version $env:BUILD_VERSION --build-number $env:GITHUB_RUN_NUMBER

      - name: Flet build (macOS / Linux)
        if: matrix.name != 'windows'
        working-directory: ${{ env.ITER_REPO }}
        run: |
          uv run flet build "${{ matrix.flet_target }}" --yes --verbose \
            --build-version "${BUILD_VERSION}" --build-number "${GITHUB_RUN_NUMBER}"

      # ===== PACKAGING =====

      - name: Package Windows installer
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          Invoke-WebRequest 'https://jrsoftware.org/download.php/is.exe' -OutFile 'C:\b\t\inno.exe'
          Start-Process 'C:\b\t\inno.exe' -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/SP-' -Wait
          
          $iss = @'
          [Setup]
          AppName=Iterthink
          AppVersion={0}
          DefaultDirName={{autopf}}\Iterthink
          DefaultGroupName=Iterthink
          OutputDir={1}
          OutputBaseFilename=iterthink-{0}-windows-installer
          Compression=lzma2
          SolidCompression=yes
          DisableProgramGroupPage=yes
          PrivilegesRequired=lowest
          
          [Files]
          Source: "{1}\build\windows\*"; DestDir: "{{app}}"; Flags: ignoreversion recursesubdirs
          
          [Icons]
          Name: "{{group}}\Iterthink"; Filename: "{{app}}\iterthink.exe"
          Name: "{{autodesktop}}\Iterthink"; Filename: "{{app}}\iterthink.exe"
          '@
          
          $issContent = $iss -f $env:BUILD_VERSION, $env:ITER_REPO
          Set-Content "$env:ITER_REPO\installer.iss" $issContent
          
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "$env:ITER_REPO\installer.iss"

      - name: Package Linux AppImage
        if: matrix.name == 'linux'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          /tmp/appimagetool --appimage-extract
          
          mkdir -p AppDir/usr/bin
          cp -r build/linux/* AppDir/usr/bin/
          
          cat > AppDir/iterthink.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Iterthink
          Exec=iterthink
          Icon=iterthink
          Categories=Utility;
          DESKTOP
          
          convert -size 256x256 xc:blue AppDir/iterthink.png 2>/dev/null || touch AppDir/iterthink.png
          
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/iterthink" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          
          ARCH=x86_64 ./squashfs-root/AppRun AppDir "iterthink-${BUILD_VERSION}-linux-x86_64.AppImage"

      - name: Package macOS DMG
        if: matrix.name == 'macos'
        run: |
          APP=$(find build/macos -name "*.app" | head -n1)
          hdiutil create -volname "Iterthink" -srcfolder "$APP" -ov -format UDZO "iterthink-${BUILD_VERSION}-macos.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-package
          path: |
            ${{ matrix.name == 'windows' && format('{0}/iterthink-*-windows-installer.exe', env.ITER_REPO) || '' }}
            ${{ matrix.name == 'linux' && 'iterthink-*-linux-x86_64.AppImage' || '' }}
            ${{ matrix.name == 'macos' && 'iterthink-*-macos.dmg' || '' }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Iterthink ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
